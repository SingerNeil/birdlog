<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16302b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <title>BirdLog</title>
    <link rel="stylesheet" href="/src/styles.css?v=0.1.3" />
  </head>
  <body>
    <section class="diagnostic-bar" aria-label="交互自检">
      <strong>交互自检</strong>
      <input id="nativeProbe" placeholder="先点这里输入 abc" />
      <button id="nativeProbeButton" type="button">点我测试</button>
      <span id="nativeProbeStatus">如果这里也不能输入/点击，说明不是 BirdLog 表单问题。</span>
    </section>
    <div id="app"></div>
    <script>
      window.__birdlogBoot = "inline script loaded";
      document.addEventListener("DOMContentLoaded", function () {
        var probe = document.getElementById("nativeProbe");
        var button = document.getElementById("nativeProbeButton");
        var status = document.getElementById("nativeProbeStatus");
        if (probe) {
          probe.addEventListener("input", function () {
            status.textContent = "原生输入正常：" + probe.value;
          });
        }
        if (button) {
          button.addEventListener("click", function () {
            status.textContent = "原生按钮正常：" + new Date().toLocaleTimeString();
          });
        }
      });
    </script>
    <script type="module" src="/src/app.js?v=0.1.3"></script>
  </body>
</html>
